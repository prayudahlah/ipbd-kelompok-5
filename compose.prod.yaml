x-airflow-common:
  &airflow-common
  build:
    context: ./airflow/
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_METADATA_CONN}
    - AIRFLOW__CORE__LOAD_EXAMPLES=False
    - AIRFLOW__CORE__DEFAULT_TIMEZONE=Asia/Jakarta
    - AIRFLOW__CORE__AUTH_MANAGER=airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    - GOOGLE_AUTH_CLIENT_ID=${GOOGLE_AUTH_CLIENT_ID}
    - GOOGLE_AUTH_CLIENT_SECRET=${GOOGLE_AUTH_CLIENT_SECRET}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/config/webserver_config.py:/opt/airflow/webserver_config.py:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    metadata:
      condition: service_healthy
  networks:
    - internal
  develop:
    watch:
      - action: rebuild
        path: ./airflow/requirements.txt
      - action: rebuild
        path: ./airflow/Dockerfile

services:
  # ---------------------------------------------------------------------------------------------------

  # Airflow
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_METADATA_CONN}
      - _AIRFLOW_DB_MIGRATE=true
    restart: on-failure

  airflow-api-server:
    <<: *airflow-common
    container_name: airflow-api-server
    command: api-server
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always

  airflow-triggerer:
    <<: *airflow-common
    container_name: airflow-triggerer
    command: triggerer
    restart: always

  airflow-dag-processor:
    <<: *airflow-common
    container_name: airflow-dag-processor
    command: dag-processor
    restart: always

  # ---------------------------------------------------------------------------------------------------

  # Data Lake
  garage-init:
    container_name: garage-init
    build:
      context: ./garage/init
      dockerfile: Dockerfile
    restart: on-failure
    environment:
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN}
      - GARAGE_ADMIN_API=${GARAGE_ADMIN_API:-http://garage:3903}
      - GARAGE_NODE_CAPACITY=${GARAGE_NODE_CAPACITY:-1000000000}
      - BUCKET_NAME=${BUCKET_NAME:-ipbd-kelompok-5}
    volumes:
      - ./garage:/mnt/garage
    entrypoint: ["/bin/sh", "/usr/local/bin/garage-init.sh"]
    depends_on:
      garage:
        condition: service_healthy

  garage:
    container_name: garage
    image: dxflrs/garage:v2.3.0
    restart: unless-stopped
    ports:
      - 3900:3900 # S3 API
      - 3903:3903 # Admin API
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
      - GARAGE_ADMIN_TOKEN=${GARAGE_ADMIN_TOKEN}
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - ./garage/meta:/var/lib/garage/meta
      - ./garage/data:/var/lib/garage/data
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------------------------------


  # Data Warehouse
  dw:
    image: postgres:17-alpine
    container_name: dw
    environment:
      - POSTGRES_USER=${DW_USER}
      - POSTGRES_PASSWORD=${DW_PASSWORD}
      - POSTGRES_DB=${DW_DB}
    volumes:
      - ./dw_data:/var/lib/postgresql/data
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------------------------------

  # Dashboard & Visualization
  metabase:
    image: metabase/metabase:v0.60.1.4
    container_name: metabase
    volumes:
      - /dev/urandom:/dev/random:ro
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${METABASE_METADATA_DB}
      MB_DB_PORT: ${METADATA_PORT:-5432} 
      MB_DB_USER: ${METADATA_USER}
      MB_DB_PASS: ${METADATA_PASSWORD}
      MB_DB_HOST: ${METADATA_HOST}
    networks:
      - internal
    depends_on:
      metadata:
        condition: service_healthy
    healthcheck:
      test: curl --fail -I http://localhost:3000/api/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------------------------------

  # Metadata for Airflow & Metabase
  metadata:
    image: postgres:17-alpine
    container_name: metadata
    environment:
      - POSTGRES_USER=${METADATA_USER}
      - POSTGRES_PASSWORD=${METADATA_PASSWORD}
      - POSTGRES_DB=${AIRFLOW_METADATA_DB}
      - METABASE_METADATA_DB=${METABASE_METADATA_DB} # Dipakai di entrypoint
    volumes:
      - ./metadata/data:/var/lib/postgresql/data
      - ./metadata/init:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  internal:
    external: true
